<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不严肃粽子人格测试 · 版本入口</title>
  <style>
    :root{
      --cream:#F7F2EA;
      --paper:#FFFDF8;
      --ink:#2A1208;
      --blue:#2D7FF9;
      --pink:#FF78D2;
      --yellow:#FFC928;
      --shadow:0 24px 60px rgba(42,18,8,.14);
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{
      min-height:100vh;
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255,120,210,.28), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(45,127,249,.22), transparent 30%),
        radial-gradient(circle at 78% 88%, rgba(255,201,40,.32), transparent 32%),
        var(--cream);
      display:grid;
      place-items:center;
      padding:24px;
    }
    main{
      width:min(920px,100%);
      border:4px solid var(--ink);
      border-radius:32px;
      background:rgba(255,253,248,.9);
      box-shadow:10px 10px 0 var(--ink), var(--shadow);
      padding:30px;
    }
    .badge{
      display:inline-flex;
      padding:8px 14px;
      border:3px solid var(--ink);
      border-radius:999px;
      background:var(--yellow);
      box-shadow:4px 4px 0 var(--ink);
      font-weight:900;
    }
    h1{
      margin:18px 0 10px;
      font-size:clamp(34px,7vw,68px);
      line-height:1;
      letter-spacing:0;
    }
    .lead{
      max-width:660px;
      margin:0;
      font-size:18px;
      line-height:1.75;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      margin-top:26px;
    }
    .card{
      min-height:240px;
      border:3px solid var(--ink);
      border-radius:24px;
      background:var(--paper);
      box-shadow:6px 6px 0 var(--ink);
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:18px;
    }
    .card.new{
      background:linear-gradient(135deg, rgba(45,127,249,.12), rgba(255,120,210,.16)), var(--paper);
    }
    .version{
      width:max-content;
      max-width:100%;
      padding:7px 12px;
      border:2px solid var(--ink);
      border-radius:999px;
      background:var(--pink);
      font-size:13px;
      font-weight:900;
    }
    .card h2{
      margin:12px 0 8px;
      font-size:28px;
      line-height:1.15;
    }
    .card p{
      margin:0;
      color:#574236;
      line-height:1.65;
      font-weight:700;
    }
    a.button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:50px;
      padding:12px 18px;
      border:3px solid var(--ink);
      border-radius:999px;
      background:linear-gradient(110deg,var(--blue),var(--pink));
      color:white;
      box-shadow:5px 5px 0 var(--ink);
      text-decoration:none;
      font-weight:900;
    }
    .card:not(.new) a.button{
      background:var(--yellow);
      color:var(--ink);
    }
    @media(max-width:720px){
      body{padding:14px}
      main{padding:20px;border-radius:24px}
      .grid{grid-template-columns:1fr}
      .card{min-height:220px}
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">版本入口</div>
    <h1>不严肃粽子人格测试</h1>
    <p class="lead">这里保留两个互相独立的版本。新版和旧版分目录存放，方便分享、对比和后续继续迭代。</p>

    <section class="grid" aria-label="版本列表">
      <article class="card new">
        <div>
          <div class="version">新版 · H5 完成版</div>
          <h2>超不正经粽子人格测试</h2>
          <p>当前最终版，包含分步选择、荒诞指数、隐藏人格、包粽子动画和结果分享文案。</p>
        </div>
        <a class="button" href="./versions/h5-magazine/">打开新版</a>
      </article>

      <article class="card">
        <div>
          <div class="version">旧版 · Classic</div>
          <h2>不严肃粽子人格测试</h2>
          <p>仓库原有版本，已完整保留到 classic 目录，不和新版逻辑混在一起。</p>
        </div>
        <a class="button" href="./versions/classic/">打开旧版</a>
      </article>
    </section>
  </main>
</body>
</html>
