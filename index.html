<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>不严肃粽子人格测试 🫔</title>
<style>
/* ============ RESET & BASE ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wormwood:#7bc67e; --rice-white:#fefaf2; --leaf-green:#5b8c45;
  --jujube-red:#c0392b; --yolk-orange:#f39c12; --text:#3d2b1f;
  --text-light:#6b5b4f; --card-bg:#fffdf7; --shadow:0 4px 20px rgba(0,0,0,.08);
  --radius:16px; --radius-sm:10px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--rice-white); color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:16px; line-height:1.6; -webkit-tap-highlight-color:transparent;
  overflow-x:hidden; max-width:100vw;
  background-image:radial-gradient(ellipse at 50% 0%, #e8f5e0 0%, var(--rice-white) 60%);
}
.app{
  width:100%; max-width:460px; min-height:100vh;
  display:flex; flex-direction:column; gap:20px; padding-bottom:40px;
}

/* ============ HEADER ============ */
.header{text-align:center;padding:28px 0 8px}
.header .icon{font-size:48px;display:block;margin-bottom:6px;animation:float 3s ease-in-out infinite}
.header h1{font-size:26px;font-weight:800;color:var(--leaf-green);letter-spacing:2px}
.header .sub{font-size:13px;color:var(--text-light);margin-top:2px}

/* ============ CARDS ============ */
.card{
  background:var(--card-bg); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:20px; border:1px solid rgba(0,0,0,.04);
}
.card-title{
  font-size:17px;font-weight:700;text-align:center;margin-bottom:14px;
  color:var(--leaf-green);display:flex;align-items:center;justify-content:center;gap:6px;
}
.card-title .step-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;background:var(--leaf-green);
  color:#fff;font-size:12px;font-weight:700;
}

/* ============ RICE GRID ============ */
.rice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rice-card{
  border:2px solid #e8e0d5; border-radius:var(--radius-sm); padding:12px 10px;
  cursor:pointer; transition:all .25s; text-align:center; position:relative;
  background:#fffdf7; user-select:none;
}
.rice-card:active{transform:scale(.96)}
.rice-card.selected{
  border-color:var(--leaf-green); background:#eef7e8;
  box-shadow:0 0 0 3px rgba(91,140,69,.15);
}
.rice-card .rice-emoji{font-size:32px;display:block;margin-bottom:4px}
.rice-card .rice-name{font-size:15px;font-weight:700;color:var(--text)}
.rice-card .rice-base{font-size:11px;color:var(--leaf-green);margin-top:1px}
.rice-card .rice-keywords{font-size:10px;color:var(--text-light);margin-top:2px}
.rice-card .check-mark{
  position:absolute;top:6px;right:8px;width:20px;height:20px;
  border-radius:50%;background:var(--leaf-green);color:#fff;
  font-size:12px;display:none;align-items:center;justify-content:center;
}
.rice-card.selected .check-mark{display:flex}
.rice-full{grid-column:1/-1}

/* ============ BUTTONS ============ */
.btn{
  display:block;width:100%;padding:14px;border:none;border-radius:30px;
  font-size:17px;font-weight:700;cursor:pointer;transition:all .25s;
  text-align:center;letter-spacing:1px;user-select:none;
}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:var(--leaf-green);color:#fff;
  box-shadow:0 6px 20px rgba(91,140,69,.3);
}
.btn-primary:hover{background:#4a7a38}
.btn-primary:disabled{
  background:#c5d5bb;color:#fff;box-shadow:none;cursor:not-allowed;
}
.btn-outline{
  background:transparent;color:var(--leaf-green);
  border:2px solid var(--leaf-green);
}
.btn-small{padding:8px 18px;font-size:13px;width:auto;display:inline-block;border-radius:20px}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row .btn{flex:1;padding:10px;font-size:14px}

/* ============ CATEGORY SECTION ============ */
.cat-section{margin-bottom:12px}
.cat-header{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
  font-size:13px;font-weight:700;color:var(--text-light);
}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px}

/* ============ FILLING CHIPS ============ */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:9px 14px;border-radius:20px;font-size:14px;
  border:1.5px solid #e0d8cc; background:#fffdf7;
  cursor:pointer;transition:all .2s;user-select:none;
  white-space:nowrap; min-height:40px;
}
.chip:active{transform:scale(.94)}
.chip.selected{
  border-color:var(--leaf-green);background:#eef7e8;
  box-shadow:0 2px 8px rgba(91,140,69,.15);
}
.chip .chip-emoji{font-size:16px}
.chip.selected .chip-emoji{animation:popIn .3s ease}
.chip.dim{opacity:.35;cursor:not-allowed;pointer-events:none}
.chip.strange{background:#f0faf3;border-color:#b8e6c0}
.chip.strange.selected{background:#d4f0da;border-color:#2ecc71}
.chip.air{
  opacity:.5;font-style:italic;border-style:dashed;border-color:#ccc;
  font-size:11px;padding:5px 10px;transition:all .3s;
}
.chip.air.selected{opacity:.8;border-color:var(--leaf-green);background:#eef7e8}

/* ============ COUNTER & SUBMIT BAR ============ */
.counter-bar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 0;font-size:14px;color:var(--text-light);
}
.counter-bar .count{font-weight:800;font-size:22px;color:var(--leaf-green)}
.counter-bar .max{color:#999}

/* ============ TOAST ============ */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:12px 24px;
  border-radius:24px;font-size:14px;font-weight:600;
  z-index:1000;opacity:0;visibility:hidden;transition:opacity .3s,transform .3s;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(4px)}
.toast.warn{background:var(--jujube-red)}

/* ============ ANIMATION OVERLAY ============ */
.anim-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(254,250,242,.92);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s;
}
.anim-overlay.active{opacity:1;pointer-events:all}

/* Zongzi in animation */
.zongzi-wrapper{
  position:relative;width:140px;height:180px;
  display:flex;align-items:center;justify-content:center;
}
.zongzi-body{
  width:70px;height:90px;background:linear-gradient(160deg,#6b9e3a,#4a7a28);
  border-radius:42% 42% 35% 35%;position:relative;z-index:2;
  box-shadow:inset 0 -4px 12px rgba(0,0,0,.15),0 8px 24px rgba(0,0,0,.12);
  transition:transform .6s cubic-bezier(.34,1.56,.64,1);
}
.zongzi-body .string{
  position:absolute;left:50%;width:50px;height:2px;
  background:rgba(255,255,255,.5);transform:translateX(-50%);
}
.zongzi-body .string:nth-child(1){top:22px}
.zongzi-body .string:nth-child(2){top:45px}
.zongzi-body .string:nth-child(3){top:68px}

/* Leaves */
.leaf{
  position:absolute;width:50px;height:80px;
  background:linear-gradient(180deg,#7bc67e,#4a7a28);
  border-radius:80% 10% 50% 10%;z-index:1;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  transform-origin:bottom center;
}
.leaf-left{bottom:30px;left:10px;transform:rotate(-35deg)}
.leaf-right{bottom:30px;right:10px;transform:rotate(35deg)}
.anim-overlay.active .leaf-left{transform:rotate(-8deg)}
.anim-overlay.active .leaf-right{transform:rotate(8deg)}
.anim-overlay.closing .leaf-left{transform:rotate(8deg)}
.anim-overlay.closing .leaf-right{transform:rotate(-8deg)}
.anim-overlay.bouncing .zongzi-body{animation:zongziBounce .6s ease}

/* Floating fillings */
.floating-filling{
  position:absolute;font-size:32px;z-index:3;
  opacity:0;transform:scale(0);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.floating-filling.show{opacity:1;transform:scale(1)}
.floating-filling.fly{opacity:0;transform:scale(0) translate(0,0);transition:all .4s ease-in}

/* ============ RESULT CARD ============ */
.result-section{display:none;flex-direction:column;gap:20px}
.result-section.show{display:flex;animation:slideUp .5s ease}

.result-hero{
  text-align:center;padding:28px 20px 20px;
  background:linear-gradient(180deg,#eef7e8 0%,var(--card-bg) 100%);
  border-radius:var(--radius) var(--radius) 0 0;
}
.result-zongzi-name{
  font-size:22px;font-weight:800;color:var(--leaf-green);
  letter-spacing:1px;margin-bottom:8px;
}
.result-rice-badge{
  display:inline-block;padding:4px 14px;border-radius:12px;
  font-size:12px;font-weight:600;color:#fff;margin-bottom:12px;
}
.result-traits{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.trait-item{
  background:#fff;border-radius:20px;padding:10px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);text-align:center;min-width:100px;
}
.trait-item .trait-label{font-size:11px;color:var(--text-light);margin-bottom:2px}
.trait-item .trait-value{font-size:15px;font-weight:700;color:var(--text)}
.trait-item .trait-dim{font-size:10px;color:var(--leaf-green);margin-top:2px}

.camp-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700;
}
.camp-sweet{background:#ffe8e0;color:#c0392b}
.camp-savory{background:#e8f0fe;color:#1a5276}
.camp-both{background:#fef5e7;color:#e67e22}
.camp-unknown{background:#f0e6f6;color:#8e44ad}

.dim-bars{margin-top:8px}
.dim-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.dim-bar-label{width:56px;text-align:right;color:var(--text-light);flex-shrink:0}
.dim-bar-track{flex:1;height:8px;background:#e8e0d5;border-radius:4px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;background:var(--leaf-green)}
.dim-bar-fill.top{background:var(--jujube-red)}
.dim-bar-fill.second{background:var(--yolk-orange)}
.dim-bar-score{width:28px;font-weight:700;font-size:12px;text-align:left;color:var(--text)}

.easter-eggs{margin-top:8px}
.egg-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600;
  background:#fef5e7;color:#e67e22;margin:3px 4px;
}

.fortune-box{
  background:linear-gradient(135deg,#fef9f0,#fffdf7);
  border:1px dashed var(--yolk-orange);border-radius:var(--radius-sm);
  padding:16px;text-align:center;margin-top:4px;
}
.fortune-box .fortune-label{font-size:12px;color:var(--yolk-orange);font-weight:600;margin-bottom:6px}
.fortune-box .fortune-text{font-size:15px;color:var(--text);font-weight:500;font-style:italic;line-height:1.7}

.disclaimer{
  margin-top:16px;padding:10px 14px;background:#fefaf2;
  border:1px solid #e8e0d5;border-radius:10px;
  font-size:11px;color:#999;text-align:center;line-height:1.6;
}

.hidden-tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.hidden-tag{
  font-size:11px;padding:3px 10px;border-radius:12px;
  background:#f0faf3;color:#2ecc71;font-weight:600;
}

/* ============ HIDDEN SECTIONS ============ */
.hidden{display:none!important}

/* ============ ANIMATIONS ============ */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes zongziBounce{
  0%{transform:translateY(0)}
  30%{transform:translateY(-30px)}
  50%{transform:translateY(0)}
  70%{transform:translateY(-12px)}
  100%{transform:translateY(0)}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ============ RESPONSIVE ============ */
@media (min-width:420px){
  .rice-grid{grid-template-columns:1fr 1fr 1fr}
  .rice-full{grid-column:auto}
}
@media (max-width:360px){
  .header h1{font-size:22px}
  .chip{font-size:13px;padding:8px 12px}
  .rice-card{padding:10px 8px}
  .btn{font-size:15px;padding:12px}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <span class="icon">🫔</span>
    <h1>不严肃粽子人格测试</h1>
    <p class="sub">测测你是什么"馅"的人</p>
  </div>

  <!-- ===== STEP 1: RICE SELECTION ===== -->
  <div class="card" id="step1">
    <div class="card-title"><span class="step-badge">1</span> 选择你的粽米</div>
    <div class="rice-grid" id="riceGrid"></div>
    <button class="btn btn-primary" id="btnNext" disabled style="margin-top:16px">选好了，去加馅料 →</button>
  </div>

  <!-- ===== STEP 2: FILLING SELECTION ===== -->
  <div class="card hidden" id="step2">
    <div class="card-title"><span class="step-badge">2</span> 选择你的馅料 <span style="font-size:12px;color:var(--text-light);font-weight:400">（1-5种）</span></div>
    <div id="fillingCategories"></div>

    <!-- Strange toppings -->
    <div class="cat-section" style="margin-top:16px">
      <div class="cat-header">
        <span class="cat-dot" style="background:#2ecc71"></span> 奇怪配料（不加也行）
      </div>
      <div class="cat-chips" id="strangeToppings"></div>
    </div>

    <!-- Hidden air filling -->
    <div style="text-align:center;margin-top:12px;opacity:.6" id="airSection">
      <span class="chip air" id="chipAir" data-id="air">👻 空气</span>
    </div>

    <!-- Counter -->
    <div class="counter-bar">
      已选 <span class="count" id="fillCount">0</span> <span class="max">/ 5</span> 种馅料
    </div>

    <!-- Selected chips preview -->
    <div id="selectedPreview" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:20px;margin-bottom:8px"></div>

    <button class="btn btn-primary" id="btnWrap" disabled>🫔 包粽子！</button>
    <button class="btn btn-outline" style="margin-top:8px;font-size:13px;padding:10px" id="btnBack">← 重新选米</button>
  </div>

  <!-- ===== RESULT SECTION ===== -->
  <div class="result-section" id="resultSection">
    <div class="card" id="resultCard" style="overflow:hidden;padding:0">
      <div class="result-hero" id="resultHero"></div>
      <div style="padding:20px" id="resultBody"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnRestart" style="flex:1">🔄 重新测试</button>
      <button class="btn btn-outline" id="btnCopy" style="flex:1">📋 复制结果文案</button>
    </div>
  </div>

</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== ANIMATION OVERLAY ===== -->
<div class="anim-overlay" id="animOverlay">
  <div class="zongzi-wrapper" id="zongziWrapper">
    <div class="leaf leaf-left"></div>
    <div class="leaf leaf-right"></div>
    <div class="zongzi-body">
      <div class="string"></div><div class="string"></div><div class="string"></div>
    </div>
  </div>
  <p style="margin-top:20px;font-size:14px;color:var(--leaf-green);font-weight:600" id="animText">正在包粽子...</p>
</div>

// ==================== TOAST ====================
let toastTimer;
function showToast(msg, isWarn=false) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast' + (isWarn ? ' warn' : '');
  requestAnimationFrame(() => { toast.classList.add('show'); });
  toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2000);
}

// ==================== RENDER RICE ====================
function renderRice() {
  riceGrid.innerHTML = RICE_TYPES.map((r,i) => {
    const isFull = (i === RICE_TYPES.length - 1 && RICE_TYPES.length % 2 === 1) ? ' rice-full' : '';
    return `<div class="rice-card${isFull}" data-rice="${r.id}" onclick="selectRice('${r.id}')">
      <span class="check-mark">✓</span>
      <span class="rice-emoji">${r.emoji}</span>
      <div class="rice-name">${r.name}</div>
    </div>`;
  }).join('');
}

// ==================== RENDER FILLINGS ====================
function renderFillings() {
  // Group by category
  const cats = {};
  FILLINGS.forEach(f => {
    if (!cats[f.cat]) cats[f.cat] = {color:f.catColor, items:[]};
    cats[f.cat].items.push(f);
  });

  const catOrder = ['肉类','豆类','果实','甜味','海鲜','菌菇','蛋黄','特殊'];

  fillingCategories.innerHTML = catOrder.map(cat => {
    if (!cats[cat]) return '';
    const c = cats[cat];
    return `<div class="cat-section">
      <div class="cat-header"><span class="cat-dot" style="background:${c.color}"></span>${cat}</div>
      <div class="cat-chips">${c.items.map(f =>
        `<span class="chip" data-id="${f.id}" data-cat="normal" onclick="toggleFilling('${f.id}','normal')">
          <span class="chip-emoji">${f.emoji}</span>${f.name}
        </span>`
      ).join('')}</div>
    </div>`;
  }).join('');

  // Strange toppings
  strangeToppings.innerHTML = STRANGE_TOPPINGS.map(s =>
    `<span class="chip strange" data-id="${s.id}" data-cat="strange" onclick="toggleFilling('${s.id}','strange')">
      <span class="chip-emoji">${s.emoji}</span>${s.name}
    </span>`
  ).join('');
}

// ==================== SELECTION LOGIC ====================
function selectRice(id) {
  selectedRice = RICE_TYPES.find(r => r.id === id);
  document.querySelectorAll('.rice-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-rice="${id}"]`);
  if (card) card.classList.add('selected');
  btnNext.disabled = false;
}

function getNormalFillingsCount() {
  return selectedFillings.filter(id => id !== 'air').length;
}

function toggleFilling(id, cat) {
  if (id === 'air') {
    selectedAir = !selectedAir;
    if (selectedAir) {
      chipAir.classList.add('selected');
    } else {
      chipAir.classList.remove('selected');
    }
    updateFillingUI();
    return;
  }

  const idx = selectedFillings.indexOf(id);
  if (idx >= 0) {
    // Deselect
    selectedFillings.splice(idx, 1);
  } else {
    // Check limit (air doesn't count)
    if (getNormalFillingsCount() >= MAX_FILLINGS) {
      showToast('这个粽子快包不下啦！🫔', true);
      return;
    }
    selectedFillings.push(id);
  }
  updateFillingUI();
}

function updateFillingUI() {
  const count = getNormalFillingsCount();
  fillCount.textContent = count;

  // Update chip states
  document.querySelectorAll('#step2 .chip').forEach(chip => {
    const cid = chip.dataset.id;
    if (cid === 'air') return;
    if (selectedFillings.includes(cid)) {
      chip.classList.add('selected');
    } else {
      chip.classList.remove('selected');
    }
    // Dim if limit reached and not selected
    if (count >= MAX_FILLINGS && !selectedFillings.includes(cid)) {
      chip.classList.add('dim');
    } else {
      chip.classList.remove('dim');
    }
  });

  // Update air chip
  if (selectedAir) {
    chipAir.classList.add('selected');
  } else {
    chipAir.classList.remove('selected');
  }

  // Preview selected
  updatePreview();

  // Button state
  const strangeCount = selectedFillings.filter(id => STRANGE_TOPPINGS.some(s => s.id === id)).length;
  btnWrap.disabled = (count === 0 && strangeCount === 0 && !selectedAir);
}

function updatePreview() {
  const allSelected = [...selectedFillings];
  if (selectedAir) allSelected.push('air');

  selectedPreview.innerHTML = allSelected.map(id => {
    if (id === 'air') return '<span style="font-size:13px;opacity:.7;padding:3px 8px;border-radius:12px;background:#eef7e8">👻 空气</span>';

    // Check normal fillings
    let f = FILLINGS.find(x => x.id === id);
    if (f) return `<span style="font-size:12px;padding:3px 8px;border-radius:12px;background:#eef7e8;color:var(--leaf-green);font-weight:600">${f.emoji} ${f.name}</span>`;

    // Check strange toppings
    let s = STRANGE_TOPPINGS.find(x => x.id === id);
    if (s) return `<span style="font-size:12px;padding:3px 8px;border-radius:12px;background:#d4f0da;color:#2ecc71;font-weight:600">${s.emoji} ${s.name}</span>`;

    return '';
  }).join('');
}

// ==================== WHITE ZONGZI EASTER EGG ====================
btnWrap.addEventListener('click', () => {
  const count = getNormalFillingsCount();
  const strangeCount = selectedFillings.filter(id => STRANGE_TOPPINGS.some(s => s.id === id)).length;
  
  // Air-only submission: air + 0 normal fillings → submit directly
  if (count === 0 && strangeCount === 0 && selectedAir) {
    whiteZongziClicks = 0;
    showToast('空气粽，包的就是一份自在... 👻');
    setTimeout(() => showAirZongziResult(), 600);
    return;
  }
  
  if (count === 0 && strangeCount === 0) {
    whiteZongziClicks++;
    if (whiteZongziClicks === 1) {
      showToast('再选一点馅料，粽子才有灵魂。');
    } else if (whiteZongziClicks >= 2 && whiteZongziClicks < 5) {
      showToast(`还剩${5-whiteZongziClicks}次，坚持到底就是白粽... 🤍`);
    } else if (whiteZongziClicks >= 5) {
      clearTimeout(whiteZongziTimer);
      whiteZongziClicks = 0;
      showToast('好吧，白粽也是粽... 🤍');
      setTimeout(() => showWhiteZongziResult(), 600);
      setTimeout(() => runAnimationAndShowResult(), 800);
      return;
    }
    clearTimeout(whiteZongziTimer);
    whiteZongziTimer = setTimeout(() => { whiteZongziClicks = 0; }, 2000);
  } else {
    whiteZongziClicks = 0;
    runAnimationAndShowResult();
  }
});

// ==================== ANIMATION ====================
function runAnimationAndShowResult() {
  step2.classList.add('hidden');
  animOverlay.classList.add('active');
  animOverlay.classList.remove('closing','bouncing');
  animText.textContent = '正在包粽子...';

  // Remove old floating fillings
  zongziWrapper.querySelectorAll('.floating-filling').forEach(el => el.remove());

  // Collect fillings to animate (exclude air, but include strange)
  const animFillings = [...selectedFillings];
  // Also note air for result but don't animate

  // Create floating emojis
  const positions = [
    {top:'-10px',left:'-20px'},{top:'-20px',left:'40px'},{top:'10px',left:'80px'},
    {top:'30px',left:'-40px'},{top:'40px',left:'90px'},
  ];

  animFillings.forEach((id, i) => {
    const el = document.createElement('span');
    el.className = 'floating-filling';
    const f = FILLINGS.find(x => x.id === id);
    const s = STRANGE_TOPPINGS.find(x => x.id === id);
    el.textContent = (f || s || {}).emoji || '🫧';
    const pos = positions[i % positions.length];
    el.style.top = pos.top;
    el.style.left = pos.left;
    zongziWrapper.appendChild(el);
  });

  const floatingEls = zongziWrapper.querySelectorAll('.floating-filling');

  // Phase 1: Show fillings one by one
  floatingEls.forEach((el, i) => {
    setTimeout(() => { el.classList.add('show'); }, 200 + i * 150);
  });

  const totalDelay = 200 + animFillings.length * 150 + 400;

  // Phase 2: Fly fillings into center
  setTimeout(() => {
    animText.textContent = '裹紧粽叶...';
    floatingEls.forEach(el => { el.classList.add('fly'); });
  }, totalDelay);

  // Phase 3: Close leaves
  setTimeout(() => {
    animOverlay.classList.add('closing');
    animText.textContent = '扎紧绳子...';
  }, totalDelay + 450);

  // Phase 4: Bounce
  setTimeout(() => {
    animOverlay.classList.add('bouncing');
    animText.textContent = '✨ 完成！';
  }, totalDelay + 950);

  // Phase 5: Show result
  setTimeout(() => {
    animOverlay.classList.remove('active','closing','bouncing');
    showResult();
  }, totalDelay + 1700);
}

// ==================== RESULT CALCULATION ====================
function showResult() {
  step1.classList.add('hidden');
  step2.classList.add('hidden');
  resultSection.classList.add('show');

  const count = getNormalFillingsCount();
  const hasAir = selectedAir;

  // White zongzi
  if (count === 0 && !hasAir) {
    showWhiteZongziResult();
    return;
  }

  // Calculate dimensions
  const dims = {};
  DIMENSIONS.forEach(d => dims[d] = 0);

  let sweetCount = 0, savoryCount = 0;
  const selectedFillingObjs = [];
  const selectedStrangeObjs = [];

  selectedFillings.forEach(id => {
    if (id === 'air') return;
    const f = FILLINGS.find(x => x.id === id);
    if (f) {
      selectedFillingObjs.push(f);
      Object.entries(f.attrs).forEach(([dim, val]) => {
        dims[dim] = (dims[dim] || 0) + val;
      });
      if (f.ss === '甜') sweetCount++;
      else if (f.ss === '咸') savoryCount++;
      return;
    }
    const s = STRANGE_TOPPINGS.find(x => x.id === id);
    if (s) selectedStrangeObjs.push(s);
  });

  // Sort dimensions
  const sorted = Object.entries(dims).sort((a,b) => b[1] - a[1]);
  const topDim = sorted[0];
  const secondDim = sorted[1];
  const corePersonality = DIM_NAMES[topDim[0]] || topDim[0];
  const hiddenPersonality = secondDim && secondDim[1] > 0 ? (DIM_NAMES[secondDim[0]] || secondDim[0]) : '无';

  // Sweet/savory camp
  let campClean, campDisplay, campClass;
  if (selectedFillingObjs.length === 0 && selectedStrangeObjs.length > 0) {
    campClean = '自定义人格'; campDisplay = '自定义人格 🌀'; campClass = 'camp-unknown';
  } else if (sweetCount >= 4 && savoryCount <= 1) {
    campClean = '甜粽'; campDisplay = '甜粽派 🍯'; campClass = 'camp-sweet';
  } else if (savoryCount >= 4 && sweetCount <= 1) {
    campClean = '咸粽'; campDisplay = '咸粽派 🧂'; campClass = 'camp-savory';
  } else if (Math.abs(sweetCount - savoryCount) <= 1) {
    campClean = '咸甜粽'; campDisplay = '咸甜粽派 🎭'; campClass = 'camp-both';
  } else if (sweetCount > savoryCount) {
    campClean = '偏甜粽'; campDisplay = '偏甜粽派 🍯'; campClass = 'camp-sweet';
  } else {
    campClean = '偏咸粽'; campDisplay = '偏咸粽派 🧂'; campClass = 'camp-savory';
  }

  // Zongzi name
  const rice = selectedRice;
  const zongziName = `${rice.base}·${corePersonality}·${campClean}粽`;

  // Easter eggs
  const eggs = [];
  // Single item eggs
  selectedFillings.forEach(id => {
    if (EASTER_EGGS_SINGLE[id]) eggs.push(EASTER_EGGS_SINGLE[id]);
  });
  // Combo eggs
  EASTER_EGGS_COMBO.forEach(combo => {
    if (combo.ids.every(id => selectedFillings.includes(id))) {
      eggs.push(combo.msg);
    }
  });
  // Air egg
  if (hasAir) eggs.push('空气人格：你相信"无"也是一种存在。');

  // Strange tags
  const strangeTags = selectedStrangeObjs.map(s => ({tag:s.tag, quote:s.quote}));

  // Fortune
  const fortune = rice.fortune;

  // Render result
  const riceBg = rice.color;
  const riceText = rice.textColor;

  resultHero.innerHTML = `
    <div class="result-zongzi-name">${zongziName}</div>
    <span class="result-rice-badge" style="${riceBg.includes('gradient') ? `background-image:${riceBg}` : `background:${riceBg}`};color:${riceText}">${rice.emoji} ${rice.name} · ${rice.base}</span>
    <div class="result-traits">
      <div class="trait-item">
        <div class="trait-label">💝 核心人格</div>
        <div class="trait-value">${corePersonality}</div>
        <div class="trait-dim">${topDim[0]} ${topDim[1]}分</div>
      </div>
      <div class="trait-item">
        <div class="trait-label">👻 隐藏人格</div>
        <div class="trait-value">${hiddenPersonality}</div>
        <div class="trait-dim">${secondDim ? secondDim[0] : ''} ${secondDim ? secondDim[1] : 0}分</div>
      </div>
    </div>
    <div style="margin-top:12px"><span class="camp-badge ${campClass}">🏕️ ${campDisplay}</span></div>
  `;

  let bodyHTML = '';

  // Easter eggs
  if (eggs.length > 0) {
    bodyHTML += '<div class="easter-eggs"><div style="font-size:13px;font-weight:700;color:var(--yolk-orange);margin-bottom:6px">🥚 隐藏彩蛋</div>';
    eggs.forEach(e => {
      bodyHTML += `<span class="egg-tag">${e}</span>`;
    });
    bodyHTML += '</div>';
  }

  // Strange tags
  if (strangeTags.length > 0) {
    bodyHTML += '<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:#2ecc71;margin-bottom:6px">🏷️ 隐藏标签</div><div class="hidden-tags-row">';
    strangeTags.forEach(st => {
      bodyHTML += `<span class="hidden-tag" title="${st.quote}">${st.tag}</span>`;
    });
    bodyHTML += '</div></div>';
  }

  // Fortune
  bodyHTML += `<div class="fortune-box">
    <div class="fortune-label">📜 端午签语</div>
    <div class="fortune-text">"${fortune}"</div>
  </div>`;

  // Disclaimer
  bodyHTML += `<div class="disclaimer">⚠️ 免责声明：所有馅料的刻板印象都是AI说的，与作者本人无关，与用户无关。图一乐，端午安康！🫔</div>`;

  resultBody.innerHTML = bodyHTML;

  // Scroll to result
  resultSection.scrollIntoView({behavior:'smooth',block:'start'});
  window.__zongziResult = {zongziName, rice, corePersonality, hiddenPersonality, camp:campDisplay, fortune, strangeTags, eggs, dims, sorted};
}

}

// ==================== RESTART ====================
btnRestart.addEventListener('click', () => {
  selectedRice = null;
  selectedFillings = [];
  selectedAir = false;
  whiteZongziClicks = 0;
  clearTimeout(whiteZongziTimer);

  resultSection.classList.remove('show');
  step2.classList.add('hidden');
  step1.classList.remove('hidden');
  chipAir.classList.remove('selected');
  btnNext.disabled = true;
  document.querySelectorAll('.rice-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('#step2 .chip').forEach(c => c.classList.remove('selected','dim'));
  updatePreview();
  fillCount.textContent = '0';
  btnWrap.disabled = true;
  step1.scrollIntoView({behavior:'smooth',block:'start'});
});

// ==================== COPY ====================
btnCopy.addEventListener('click', async () => {
  const r = window.__zongziResult;
  if (!r) return;

  let text = `🫔 我的粽子人格是：【${r.zongziName}】\n\n`;
  text += `🌾 粽米：${r.rice.emoji} ${r.rice.name}（${r.rice.base||'纯粹'}）\n`;
  text += `💝 核心人格：${r.corePersonality}`;
  if (r.sorted && r.sorted[0]) text += `（${r.sorted[0][0]}最高）`;
  text += `\n`;
  text += `👻 隐藏人格：${r.hiddenPersonality}`;
  if (r.sorted && r.sorted[1]) text += `（${r.sorted[1][0]}次高）`;
  text += `\n`;
  text += `🏕️ 口味阵营：${r.camp}\n`;

  if (r.strangeTags && r.strangeTags.length > 0) {
    text += `\n🏷️ 隐藏标签：${r.strangeTags.map(s=>s.tag).join('、')}\n`;
  }

  if (r.eggs && r.eggs.length > 0 && !r.eggs[0].includes('你拒绝了所有定义')) {
    text += `\n🥚 彩蛋：${r.eggs.join(' | ')}\n`;
  }

  text += `\n📜 端午签语：\n"${r.fortune}"\n`;
  text += `\n—— 来自「不严肃粽子人格测试」\n你也来测测吧～ 🫔`;

  try {
    await navigator.clipboard.writeText(text);
    showToast('✅ 结果文案已复制！快去分享吧～');
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 结果文案已复制！快去分享吧～');
  }
});

// ==================== INIT ====================
function init() {
  renderRice();
  renderFillings();
  updateFillingUI();
  // Air chip handler
  chipAir.addEventListener('click', () => toggleFilling('air','air'));
}

init();
</script>
